name: Publish

# Publishes to npm when you push a version tag, e.g.:
#   npm version patch      # bumps package.json + creates the tag
#   git push --follow-tags # pushes main + the tag → triggers this workflow
on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # lets npm attach build provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      # `prepublishOnly` (npm run lint && npm test) runs automatically here as
      # the final gate before the package is uploaded.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
